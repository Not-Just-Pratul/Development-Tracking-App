version: '3.8'

services:
  # Use this if you want a local PostgreSQL database
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: development_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.pgsql:/docker-entrypoint-initdb.d/init.pgsql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    ports:
      - "5003:5003"
    environment:
      # For local DB, use the connection below:
      # - DATABASE_URL=postgresql://postgres:postgres@db:5432/development_tracking
      
      # For cloud databases (Neon, Railway, Supabase, etc.), 
      # set DATABASE_URL in your hosting platform's environment variables
      - SECRET_KEY=change_this_in_production
    volumes:
      - ./uploads:/app/uploads
    # Uncomment below if using local db service:
    # depends_on:
    #   db:
    #     condition: service_healthy
    command: >
      sh -c "
        python run_server.py
      "

volumes:
  postgres_data:
